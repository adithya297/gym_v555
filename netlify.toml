# Netlify build & deploy config for the V555 Fitness Zone (Vite SPA)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for client routes.
# Real files (JS/CSS in /assets) are served before this rule, so it
# only catches navigation paths — never your hashed asset bundles.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Explicit correct MIME types (belt-and-suspenders)
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
